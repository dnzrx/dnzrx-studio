<section id="tc" class="py-14 md:py-24 px-4 sm:px-6">

    <div class="panel p-5 sm:p-6 lg:p-10 reveal reveal-left">
      <div class="mb-6 md:mb-7">
        <h2 class="font-headline text-2xl md:text-3xl font-bold" data-render="tc-title">Terms &amp; conditions</h2>
        <p class="mt-2 text-sm text-ethereal-ink/70" data-render="tc-subtitle">Clear policies to keep the process smooth, fast, and fair for both sides.</p>
      </div>

      <div class="md:hidden space-y-4 text-sm leading-7 text-ethereal-ink/80">
        <aside class="rounded-2xl border border-ethereal-line bg-white/86 p-4">
          <p class="text-[11px] uppercase tracking-[0.16em] text-ethereal-twilight font-semibold" data-render="tc-snapshot-title-mobile">Quick policy snapshot</p>
          <ul class="mt-3 space-y-2.5" data-render="policy-snapshot-mobile"></ul>

        <p class="px-1 text-xs text-ethereal-ink/62" data-render="tc-mobile-hint">Tap a section to read details.</p>

          <ul class="mt-4 space-y-3 text-sm text-ethereal-ink/80" data-render="policy-snapshot-desktop"></ul>
        </aside>
        <div class="tc-detail-grid lg:col-span-9 grid grid-cols-1 md:grid-cols-2 md:auto-rows-fr gap-4 text-sm text-ethereal-ink/80" data-render="policy-cards-desktop"></div>
      </div>
    </div>
  </div>
</section>
